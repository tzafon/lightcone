name: Sync TypeScript SDK

on:
  # Run manually anytime
  workflow_dispatch:
  # Or check automatically every hour
  schedule:
    - cron: "30 * * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lightcone (monorepo)
        uses: actions/checkout@v4
        with:
          path: lightcone

      - name: Checkout lightcone-typescript (Stainless SDK)
        uses: actions/checkout@v4
        with:
          repository: tzafon/lightcone-typescript
          path: lightcone-typescript
          token: ${{ secrets.SDK_SYNC_TOKEN }}

      - name: Get source commit SHA
        id: source
        working-directory: lightcone-typescript
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Sync SDK files
        run: |
          # Create target directory if it doesn't exist
          mkdir -p lightcone/sdks/typescript

          # Allowlist: only sync files needed to use/build the SDK
          # Everything not explicitly included is excluded
          rsync -av --delete \
            --include='src/' --include='src/**' \
            --include='tests/' --include='tests/**' \
            --include='examples/' --include='examples/**' \
            --include='package.json' \
            --include='pnpm-lock.yaml' \
            --include='pnpm-workspace.yaml' \
            --include='tsconfig.json' \
            --include='tsconfig.build.json' \
            --include='tsconfig.deno.json' \
            --include='tsconfig.dist-src.json' \
            --include='tsc-multi.json' \
            --include='eslint.config.mjs' \
            --include='jest.config.ts' \
            --include='.prettierrc.json' \
            --include='.prettierignore' \
            --include='.gitignore' \
            --include='api.md' \
            --include='README.md' \
            --include='LICENSE' \
            --include='CHANGELOG.md' \
            --exclude='*' \
            lightcone-typescript/ \
            lightcone/sdks/typescript/

      - name: Check for changes
        id: changes
        working-directory: lightcone
        run: |
          git add sdks/typescript/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true'
        working-directory: lightcone
        env:
          GH_TOKEN: ${{ secrets.SDK_SYNC_TOKEN }}
        run: |
          BRANCH="sync/typescript-sdk"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or switch to the sync branch
          git checkout -B "$BRANCH"
          git commit -m "sync: update TypeScript SDK from lightcone-typescript (${{ steps.source.outputs.sha }})"
          git push --force origin "$BRANCH"

          # Create PR if one doesn't already exist
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "sync: update TypeScript SDK" \
              --body "Automated sync from [lightcone-typescript](https://github.com/tzafon/lightcone-typescript) at commit \`${{ steps.source.outputs.sha }}\`.

          This PR was created automatically by the SDK sync workflow." \
              --head "$BRANCH" \
              --base main
          else
            echo "PR #$EXISTING_PR already exists, pushed updated changes."
          fi
